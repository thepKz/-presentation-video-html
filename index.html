<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-bg: #06070a;
            --color-bg-deep: #020305;
            --color-surface: #0d0e14;
            --color-text: #f0ede8;
            --color-text-secondary: #c8c0b0;
            --color-text-muted: #6a6055;
            --color-accent-1: #c8382a;
            --color-accent-2: #ff6b35;
            --color-accent-3: #ff9d00;
            --color-glass-bg: rgba(200,56,42,0.06);
            --color-glass-border: rgba(200,56,42,0.18);
            --color-vignette: rgba(0,0,0,0.72);
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
        }
    </style>

    <style>
        :root {
            --color-bg: #06070a;
            --color-text: #f0ede8;
            --glow-color-rgb: 200,56,42;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { background: var(--color-bg); margin: 0; }
        body { font-family: 'DM Sans', sans-serif; color: var(--color-text); overflow: hidden; height: 100vh; width: 100vw; }
        .deck { width: 100vw; height: 100vh; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: scale(0.96); transition: opacity 0.8s ease, transform 0.8s ease; pointer-events: none; overflow: hidden; }
        .slide.active { opacity: 1; transform: scale(1); pointer-events: all; }
        .slide > .content { position: relative; z-index: 2; width: 100%; max-width: 1100px; padding: clamp(1.5rem, 4vw, 4rem); }
        .nav-controls { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; z-index: 100; background: rgba(200,56,42,0.07); backdrop-filter: blur(12px); padding: 10px 24px; border-radius: 40px; border: 1px solid rgba(200,56,42,0.20); }
        .nav-btn { width: 38px; height: 38px; border: none; background: transparent; color: #c8382a; border-radius: 50%; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .nav-btn:hover { background: rgba(200,56,42,0.15); }
        .slide-dots { display: flex; gap: 7px; }
        .slide-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(200,56,42,0.22); cursor: pointer; transition: all 0.3s; }
        .slide-dots .dot.active { background: #c8382a; transform: scale(1.45); box-shadow: 0 0 8px rgba(200,56,42,0.6); }
        .slide-counter { font-size: .75rem; color: #6a6055; min-width: 36px; text-align: center; letter-spacing: .05em; }
        .reveal { opacity: 0; transform: translateY(22px); }
        .text-glow { text-shadow: 0 0 24px rgba(200,56,42,0.7), 0 0 48px rgba(200,56,42,0.3); }
        .stat-glow { text-shadow: 0 0 36px rgba(200,56,42,0.9), 0 0 72px rgba(255,107,53,0.4); }
        @keyframes glow-pulse { 0%,100%{text-shadow:0 0 20px rgba(200,56,42,.7),0 0 40px rgba(200,56,42,.3)} 50%{text-shadow:0 0 40px rgba(255,107,53,1),0 0 80px rgba(200,56,42,.5)} }
        .glow-pulse { animation: glow-pulse 2.8s ease-in-out infinite; }
        @keyframes float-slow { 0%{transform:translate(0,0) scale(1)} 25%{transform:translate(55px,-45px) scale(1.1)} 50%{transform:translate(-40px,38px) scale(0.9)} 75%{transform:translate(45px,18px) scale(1.07)} 100%{transform:translate(0,0) scale(1)} }
        @keyframes float-drift { 0%{transform:translate(0,0) scale(1) rotate(0deg)} 33%{transform:translate(-50px,-55px) scale(1.14) rotate(3deg)} 66%{transform:translate(38px,28px) scale(0.87) rotate(-2deg)} 100%{transform:translate(0,0) scale(1) rotate(0deg)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        .gradient-mesh { position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
        .blob { position:absolute; border-radius:50%; filter:blur(90px); animation:float-slow 11s ease-in-out infinite; }
        .blob:nth-child(2){animation:float-drift 15s ease-in-out infinite;}
        .blob:nth-child(3){animation:float-slow 19s ease-in-out infinite reverse;}
        @keyframes dash-flow { from{stroke-dashoffset:1200} to{stroke-dashoffset:0} }
        @keyframes dash-reverse { from{stroke-dashoffset:0} to{stroke-dashoffset:1200} }
        .evil-line { stroke-dasharray: 8 4; animation: dash-flow 5s linear infinite; }
        .evil-line-rev { stroke-dasharray: 6 6; animation: dash-reverse 7s linear infinite; }
        @keyframes flicker { 0%,100%{opacity:.9} 33%{opacity:.4} 66%{opacity:.75} }
        .flicker { animation: flicker 2.5s ease-in-out infinite; }
        @keyframes ember-rise { 0%{transform:translateY(0) scale(1);opacity:.8} 100%{transform:translateY(-80px) scale(.2);opacity:0} }
        .ember { animation: ember-rise var(--dur) ease-out var(--delay) infinite; }
        @keyframes scale-breath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
        .scale-breath { animation: scale-breath 4s ease-in-out infinite; }
        @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes spin-rev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
        .slide::before { content:''; position:absolute; inset:0; z-index:1; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E"); background-repeat:repeat; background-size:256px 256px; opacity:0.05; mix-blend-mode:overlay; }
        .slide::after { content:''; position:absolute; inset:0; z-index:1; pointer-events:none; background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%); }
        .card-evil { background: linear-gradient(135deg, rgba(200,56,42,0.07) 0%, rgba(255,107,53,0.03) 100%); border: 1px solid rgba(200,56,42,0.20); border-radius:14px; padding:1.6rem 1.8rem; position:relative; overflow:hidden; transition:transform .3s, box-shadow .3s; }
        .card-evil:hover { transform: translateY(-5px); box-shadow: 0 14px 44px rgba(200,56,42,0.20); }
        .card-evil::before { content:''; position:absolute; inset:0; border-radius:14px; background: linear-gradient(135deg, rgba(200,56,42,0.06), transparent 60%); pointer-events:none; }
        .accent-bar { width:32px; height:3px; background: linear-gradient(90deg,#c8382a,#ff6b35); border-radius:2px; margin-bottom:.75rem; }
        .num-badge { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#c8382a,#ff6b35); display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:800; color:#fff; flex-shrink:0; box-shadow:0 0 10px rgba(200,56,42,0.5); }
        .topic-row { display:flex; align-items:flex-start; gap:.9rem; padding:.85rem 1.1rem; border-radius:10px; border:1px solid rgba(200,56,42,0.12); background:rgba(200,56,42,0.04); transition:background .25s; }
        .topic-row:hover { background:rgba(200,56,42,0.10); }
        .price-slash { position:relative; display:inline-block; color:#6a6055; }
        .price-slash::after { content:''; position:absolute; left:0; top:50%; width:100%; height:2px; background:#c8382a; transform:rotate(-8deg); box-shadow:0 0 6px rgba(200,56,42,0.6); }
        .stat-pill { display:inline-flex; align-items:center; gap:.5rem; padding:.4rem 1rem; border-radius:30px; border:1px solid rgba(200,56,42,0.35); background:rgba(200,56,42,0.08); }
    </style>

<div class="nav-controls">
    <button class="nav-btn" onclick="changeSlide(-1)">&#8249;</button>
    <div class="slide-dots" id="dots"></div>
    <button class="nav-btn" onclick="changeSlide(1)">&#8250;</button>
    <span class="slide-counter" id="counter">1 / 1</span>
</div>

<script>
    let current = 1;
    const total = document.querySelectorAll('.slide').length;
    const dotsContainer = document.getElementById('dots');
    const counter = document.getElementById('counter');
    for (let i = 1; i <= total; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 1 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dotsContainer.appendChild(dot);
    }
    function goToSlide(n) {
        document.querySelector('.slide.active')?.classList.remove('active');
        document.querySelector(`.slide[data-slide="${n}"]`)?.classList.add('active');
        current = n;
        document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i+1===current));
        counter.textContent = current + ' / ' + total;
    }
    function changeSlide(dir) { let n = current+dir; if(n<1)n=total; if(n>total)n=1; goToSlide(n); }
    document.addEventListener('keydown', e => { if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();changeSlide(1);} if(e.key==='ArrowLeft'){e.preventDefault();changeSlide(-1);} });
</script>
